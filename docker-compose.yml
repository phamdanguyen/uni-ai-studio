# WAOO Studio — Development Environment
# PostgreSQL, NATS, Redis, MinIO, Backend Server

services:
  postgres:
    image: postgres:16-alpine
    container_name: waoo-postgres
    environment:
      POSTGRES_USER: waoo
      POSTGRES_PASSWORD: waoo_secret
      POSTGRES_DB: waoo_studio
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waoo -d waoo_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: waoo-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --protected-mode no
  waoo-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # Đổi số bên trái thành 6380
    command: redis-server --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: waoo-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waoo-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=waoo
      - DB_PASSWORD=waoo_secret
      - DB_NAME=waoo_studio
      - REDIS_URL=redis:6379
      - NATS_URL=nats://nats:4222
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - postgres
      - redis
      - nats

volumes:
  postgres_data:
  nats_data:
  redis_data:
  minio_data:
