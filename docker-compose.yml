version: '3.8'

services:
  nats:
    image: nats:2.10-alpine
    container_name: waoo-nats
    networks:
      - waoo-internal

  postgres:
    image: postgres:16-alpine
    container_name: waoo-postgres
    environment:
      POSTGRES_USER: waoo
      POSTGRES_PASSWORD: waoo_secret
      POSTGRES_DB: waoo_studio
    volumes:
      - waoo-pgdata:/var/lib/postgresql/data
    networks:
      - waoo-internal

  redis:
    image: redis:7-alpine
    container_name: waoo-redis
    networks:
      - waoo-internal

  backend:
    build: .
    container_name: waoo-backend
    env_file: .env
    ports:
      - "8082:8080"
    depends_on:
      - postgres
      - nats
      - redis
    networks:
      - waoo-internal

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_AUTH_ENABLED: "false"
        NEXT_PUBLIC_API_URL: "http://localhost:8082"
    container_name: waoo-web
    ports:
      - "3003:3000"
    depends_on:
      - backend
    networks:
      - waoo-internal

networks:
  waoo-internal:
    driver: bridge

volumes:
  waoo-pgdata: